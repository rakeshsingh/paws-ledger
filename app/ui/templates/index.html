<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Microchip Registry | PawsLedger</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --primary: #d97706;
            --primary-hover: #b45309;
            --bg: #fffcf9;
            --card-bg: #ffffff;
            --text-main: #451a03;
            --text-muted: #78350f;
            --border: #fde6d2;
            --accent: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        header {
            background: rgba(255, 252, 249, 0.8);
            backdrop-filter: blur(12px);
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .logo { 
            font-size: 1.75rem; font-weight: 800; color: var(--primary); text-decoration: none; 
            letter-spacing: -0.05em; display: flex; align-items: center; gap: 0.25rem;
        }
        .logo span { color: var(--text-muted); font-weight: 400; }

        nav { display: flex; gap: 2.5rem; align-items: center; }
        nav a { 
            text-decoration: none; color: var(--text-main); font-size: 0.95rem; font-weight: 600; 
            opacity: 0.7; transition: all 0.2s; 
        }
        nav a:hover { opacity: 1; color: var(--primary); }

        .btn-primary {
            background: var(--primary); color: white; padding: 0.8rem 1.75rem;
            border-radius: 14px; text-decoration: none; font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: none; cursor: pointer;
            box-shadow: 0 4px 12px rgba(217, 119, 6, 0.2);
        }

        .btn-primary:hover { 
            background: var(--primary-hover); transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(217, 119, 6, 0.3);
        }

        main { 
            flex: 1; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; padding: 6rem 2rem; 
        }

        .hero-section { width: 100%; max-width: 800px; text-align: center; }
        .hero-section h1 { 
            font-size: 4.5rem; font-weight: 800; line-height: 1; margin-bottom: 1.5rem; 
            letter-spacing: -0.04em; color: var(--text-main);
        }
        .hero-section p.subtitle { font-size: 1.25rem; color: var(--text-muted); margin-bottom: 4rem; max-width: 600px; margin-left: auto; margin-right: auto; }

        .search-card {
            background: var(--card-bg); padding: 3rem; border-radius: 32px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(69, 26, 3, 0.08);
        }

        .search-form { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
        .input-wrapper { flex: 1; }

        input[type="text"] {
            width: 100%; padding: 1.25rem 1.5rem; font-size: 1.25rem;
            border: 2px solid var(--border); border-radius: 18px;
            transition: all 0.2s; font-family: 'Courier New', monospace;
            background: #fffbf7; color: var(--text-main);
        }

        input[type="text"]:focus { 
            outline: none; border-color: var(--primary); background: white;
            box-shadow: 0 0 0 4px rgba(217, 119, 6, 0.1);
        }

        #results {
            margin-top: 2.5rem; text-align: left; border-radius: 24px;
            border: 1px solid var(--border); overflow: hidden; display: none;
            background: #fffcf9; animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .results-inner { padding: 2rem; }
        .badge { 
            display: inline-block; padding: 0.4rem 1rem; border-radius: 99px; 
            font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em;
            margin-bottom: 1rem; background: #fef3c7; color: #92400e;
        }

        footer { 
            padding: 4rem 2rem; text-align: center; font-size: 0.9rem; 
            color: var(--text-muted); border-top: 1px solid var(--border); 
            background: white; opacity: 0.6;
        }

        @media (max-width: 768px) { 
            .hero-section h1 { font-size: 3rem; }
            .search-form { flex-direction: column; } 
            nav { display: none; } 
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">Paws<span>Ledger</span></a>
        <nav>
            <a href="/about.html">The Mission</a>
            <a href="/contact.html">Support</a>
            <a href="/owner_dashboard.html" id="nav-dashboard" style="display: none;">My Ledger</a>
            <a href="/login" class="btn-primary" id="nav-auth">Sign In</a>
        </nav>
    </header>

    <main>
        <div class="hero-section">
            <h1>Secure Identity for Every Pet</h1>
            <p class="subtitle">Link physical microchips to a trusted digital history. The single source of truth for responsible pet owners.</p>
            
            <div class="search-card">
                <form id="lookup-form" class="search-form">
                    <div class="input-wrapper">
                        <input type="text" id="microchip" placeholder="Enter 15-digit ID" required maxlength="15">
                    </div>
                    <button type="submit" class="btn-primary" id="submit-btn">Verify Identity</button>
                </form>
                <div id="results">
                    <div class="results-inner">
                        <span id="status-badge" class="badge">Verified Record</span>
                        <h2 id="result-title" style="font-size: 2rem; margin-bottom: 0.5rem; letter-spacing: -0.03em;"></h2>
                        <p id="result-desc" style="font-size: 1.1rem; opacity: 0.8; margin-bottom: 1.5rem;"></p>
                        <div id="result-details" style="border-top: 1px solid var(--border); padding-top: 1.5rem;"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const checkAuth = async () => {
            try {
                const response = await fetch('/api/v1/me');
                const data = await response.json();
                const dashLink = document.getElementById('nav-dashboard');
                const authLink = document.getElementById('nav-auth');
                if (data.authenticated) {
                    if (dashLink) dashLink.style.display = 'block';
                    if (authLink) {
                        authLink.textContent = 'Dashboard';
                        authLink.href = '/owner_dashboard.html';
                    }
                }
            } catch (e) { console.error('Auth check failed', e); }
        };

        const handleLookup = async (chipId) => {
            const submitBtn = document.getElementById('submit-btn');
            const resultsDiv = document.getElementById('results');
            const resultTitle = document.getElementById('result-title');
            const resultDesc = document.getElementById('result-desc');
            const resultDetails = document.getElementById('result-details');

            submitBtn.disabled = true;
            submitBtn.textContent = 'Verifying...';
            resultsDiv.style.display = 'none';

            try {
                const response = await fetch(`/api/v1/lookup/${chipId}`);
                const result = await response.json();

                if (response.ok) {
                    resultsDiv.style.display = 'block';
                    resultTitle.textContent = result.source === 'local' ? result.data.name || 'Pet Found' : 'External Record';
                    resultDesc.textContent = result.message;
                    if (result.source === 'local') {
                        resultDetails.innerHTML = `<div style="display:grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div><label style="font-size:0.7rem; font-weight:800; text-transform:uppercase; color:var(--primary);">Species</label><div>${result.data.pet_species}</div></div>
                            <div><label style="font-size:0.7rem; font-weight:800; text-transform:uppercase; color:var(--primary);">Breed</label><div>${result.data.breed}</div></div>
                        </div>
                        <a href="/pet_profile.html?id=${result.data.id}" class="btn-primary" style="display:block; text-align:center; margin-top:2rem;">View Full Ledger</a>`;
                    } else {
                        resultDetails.innerHTML = `<p style="margin-bottom:1.5rem;">Manufacturer: ${result.data.manufacturer}</p>
                        <a href="/login" class="btn-primary" style="display:block; text-align:center;">Claim this Identity</a>`;
                    }
                } else {
                    alert('No registration found for this ID.');
                }
            } catch (error) {
                console.error('Lookup failed', error);
                alert('An error occurred. Please try again.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Verify Identity';
            }
        };

        document.getElementById('lookup-form').addEventListener('submit', (e) => {
            e.preventDefault();
            handleLookup(document.getElementById('microchip').value);
        });

        window.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('chip')) handleLookup(urlParams.get('chip'));
        });
    </script>

    <footer>
        &copy; 2026 PawsLedger &bull; Identity as a Service for Pets &bull; ISO 11784 Compliant
    </footer>
</body>
</html>
