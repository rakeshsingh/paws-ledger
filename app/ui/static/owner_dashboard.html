<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Ledger | PawsLedger</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        :root {
            --primary: #d97706; --primary-hover: #b45309; --bg: #fffcf9; --card-bg: #ffffff;
            --text-main: #451a03; --text-muted: #78350f; --border: #fde6d2;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text-main); line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: rgba(255, 252, 249, 0.8); backdrop-filter: blur(12px); padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.75rem; font-weight: 800; color: var(--primary); text-decoration: none; letter-spacing: -0.05em; }
        nav { display: flex; gap: 2.5rem; align-items: center; }
        nav a { text-decoration: none; color: var(--text-main); font-size: 0.95rem; font-weight: 600; opacity: 0.7; }
        .btn-primary { background: var(--primary); color: white; padding: 0.8rem 1.75rem; border-radius: 14px; text-decoration: none; font-weight: 700; transition: all 0.3s; border: none; cursor: pointer; }
        main { flex: 1; padding: 4rem 2rem; max-width: 1100px; margin: 0 auto; width: 100%; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; }
        .pet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; }
        .pet-card { background: white; border-radius: 28px; border: 1px solid var(--border); padding: 2.5rem; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .pet-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(69, 26, 3, 0.08); border-color: var(--primary); }
        .pet-card h3 { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 0.5rem; }
        .pet-badge { display: inline-block; padding: 0.3rem 0.75rem; border-radius: 8px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; background: #fff7ed; color: var(--primary); margin-bottom: 1.5rem; }
        .info-row { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 0.5rem; opacity: 0.8; }
        footer { padding: 4rem 2rem; text-align: center; font-size: 0.9rem; color: var(--text-muted); opacity: 0.6; }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">Paws<span>Ledger</span></a>
        <nav>
            <a href="/about.html">The Mission</a>
            <a href="/contact.html">Support</a>
            <a href="/owner_dashboard.html" id="nav-dashboard">My Ledger</a>
            <a href="/logout" class="btn-primary" id="nav-auth">Logout</a>
        </nav>
    </header>

    <main>
        <div class="dashboard-header">
            <h1 style="font-size: 3rem; font-weight: 800; letter-spacing: -0.04em;">My Registered Pets</h1>
            <a href="/pet_register.html" class="btn-primary">+ Register New Pet</a>
        </div>

        <div id="pet-container" class="pet-grid">
            <!-- Mock data for visualization -->
            <div class="pet-card" onclick="location.href='/pet_profile.html?id=123'">
                <span class="pet-badge">Dog • Verified</span>
                <h3>Buddy</h3>
                <div class="info-row"><span>Breed</span><span>Golden Retriever</span></div>
                <div class="info-row"><span>Microchip</span><span>985112012016385</span></div>
                <div style="margin-top: 2rem; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 0.5rem;">View Full Ledger <span>&rarr;</span></div>
            </div>
        </div>
    </main>

    <script>
        const checkAuth = async () => {
            try {
                const response = await fetch('/api/v1/me');
                const data = await response.json();
                if (!data.authenticated) window.location.href = '/login';
            } catch (e) { console.error('Auth check failed', e); }
        };
        window.addEventListener('DOMContentLoaded', checkAuth);
    </script>

    <footer>&copy; 2026 PawsLedger &bull; Sovereign Identity for Pets</footer>
</body>
</html>
