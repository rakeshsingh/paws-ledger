<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="pawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B5452A"/>
      <stop offset="100%" stop-color="#8B3520"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4956A"/>
      <stop offset="100%" stop-color="#B5452A"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E6D3"/>
      <stop offset="100%" stop-color="#E8D5BD"/>
    </linearGradient>
  </defs>

  <!-- Paw print icon -->
  <g transform="translate(20, 12)">
    <!-- Main pad -->
    <ellipse cx="38" cy="58" rx="18" ry="16" fill="url(#pawGrad)"/>
    <!-- Toe pads -->
    <ellipse cx="20" cy="34" rx="9" ry="11" fill="url(#pawGrad)"/>
    <ellipse cx="38" cy="26" rx="9" ry="11" fill="url(#pawGrad)"/>
    <ellipse cx="56" cy="34" rx="9" ry="11" fill="url(#pawGrad)"/>
    <!-- Microchip signal lines on main pad -->
    <rect x="32" y="52" width="12" height="12" rx="2" fill="none" stroke="#F5E6D3" stroke-width="1.5"/>
    <line x1="35" y1="55" x2="35" y2="61" stroke="#F5E6D3" stroke-width="1" stroke-linecap="round"/>
    <line x1="38" y1="54" x2="38" y2="62" stroke="#F5E6D3" stroke-width="1" stroke-linecap="round"/>
    <line x1="41" y1="55" x2="41" y2="61" stroke="#F5E6D3" stroke-width="1" stroke-linecap="round"/>
    <!-- Signal arcs -->
    <path d="M 60 20 A 12 12 0 0 1 60 8" fill="none" stroke="url(#chipGrad)" stroke-width="2" stroke-linecap="round"/>
    <path d="M 66 22 A 18 18 0 0 1 66 4" fill="none" stroke="url(#chipGrad)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <path d="M 72 24 A 24 24 0 0 1 72 0" fill="none" stroke="url(#chipGrad)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Text: Paws -->
  <text x="115" y="62" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#B5452A" letter-spacing="-1">Paws</text>

  <!-- Text: Ledger -->
  <text x="237" y="62" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#4A3728" letter-spacing="-1">Ledger</text>

  <!-- Tagline -->
  <text x="116" y="82" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="#8B7355" letter-spacing="2">MICROCHIP REGISTRY &amp; RECOVERY</text>
</svg>
