name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - run: pip install . --group dev

      - run: pytest --tb=short -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Navigate to the app directory (Gunicorn/systemd app is installed at /home/paws/paws-ledger)
            cd /home/paws/paws-ledger || exit 1
            
            # Ensure it is initialized as a git repository if .git is missing
            if [ ! -d .git ]; then
              echo "Initializing git repository..."
              git init
              git remote add origin https://github.com/rakeshsingh/paws-ledger.git
            fi
            
            # Fetch and reset to the latest main branch
            git fetch origin main
            git reset --hard origin/main
            
            # Ensure correct permissions so the 'paws' user owns the files
            chown -R paws:paws /home/paws/paws-ledger
            
            # Install python dependencies in the virtual environment
            sudo -u paws .venv/bin/pip install -r requirements.txt
            
            # Run database migrations
            sudo -u paws .venv/bin/python migrate.py
            
            # Restart the systemd Gunicorn service
            sudo systemctl restart pawsledger
            
            # Verify the service is healthy
            sleep 5
            curl -sf http://localhost:8080/health || (echo "Health check failed" && exit 1)
